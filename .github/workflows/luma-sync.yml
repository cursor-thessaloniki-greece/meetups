name: Luma Sync

permissions:
  contents: write

on:
  repository_dispatch:
    types: [luma_webhook]

jobs:
  update-latest-event:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.PUSH_TOKEN || github.token }}

      - name: Dump Luma payload to file
        run: |
          mkdir -p data
          echo '${{ toJson(github.event.client_payload) }}' > data/latest_event.json

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "PUSH_TOKEN is not set. Add it as a repository secret in Settings > Secrets and variables > Actions." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_event.json
          git commit -m "chore: update latest Luma event" || echo "no changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/cursor-thessaloniki-greece/meetups.git HEAD:main
