name: Luma Sync

permissions:
  contents: write

on:
  repository_dispatch:
    types: [luma_webhook]

jobs:
  update-latest-event:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Dump Luma payload to file
        run: |
          mkdir -p data
          echo '${{ toJson(github.event.client_payload) }}' > data/latest_event.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_event.json
          git commit -m "chore: update latest Luma event" || echo "no changes to commit"
          git push origin HEAD:main
